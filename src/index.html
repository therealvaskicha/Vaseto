<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VA Home</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="icon" type="image/png" href="/Images/fav/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/Images/fav/favicon.svg" />
    <link rel="shortcut icon" href="/Images/fav/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/Images/fav/apple-touch-icon.png" />
    <link rel="manifest" href="/Images/fav/site.webmanifest" />
    <script src="scripts/main.js" defer></script>
</head>
</head>
<body>
    <header>
        <div class="top-images">
            <img src="Images/fat-logo-trt.png" alt="VA logo" class="logo"></img>
            <img src="Images/invert-fat-white-trt.png" alt="VA logo" class="invert-logo"></img>
        </div>
    </header>
    <main>
        <section class="content">
            <div class="wrap">
                <div class="welcome-message">
                    <h1>Hi. </h1>
                    <h2 class="website-title">Vasil's website</h2>
                </div>
                <div class="dashboard">
                    <div class="projects">
                        <li>
                            <h2 id="cv-link" class="project-link">CV</h2>
                        </li>
                        <li>
                            <h2 id="projects-link" class="project-link">Projects</h2>
                        </li>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <div id="tba-modal" class="tba-modal">
        <div class="blob">
            <div class="blob-content">
                <p class="tba-text">to be added..</p>
                <button id="tba-ok-btn" class="tba-btn">Ok</button>
            </div>
        </div>
    </div>
    <footer>
        <div class="lightbulb">
            <img src="Images/lightbulb-off.png" alt="Dark mode" class="lights-off">
            <img src="Images/lightbulb-on.png" alt="Light mode" class="lights-on">
        </div>
    </footer>
</body>
</html>
